<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查詢保固書</title>
  <style>
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Rg.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Rg.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Bd.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Bd.ttf") format("truetype"); font-weight: 700; font-style: normal; font-display: swap; }
    :root { --bg:#141210; --panel:#1f1b18; --gold:#d1b07a; --ink:#f7efdf; --muted:rgba(247,239,223,.72); --line:rgba(209,176,122,.22); }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background:linear-gradient(180deg,#0f0d0c,#181410 48%,#120f0d); color:var(--ink); font-family:"LINE Seed TW","Noto Sans TC","Microsoft JhengHei",sans-serif; }
    body { padding:20px 14px 40px; }
    .wrap { width:min(980px,100%); margin:0 auto; display:grid; gap:18px; }
    .hero,.panel { background:linear-gradient(180deg,rgba(37,31,26,.96),rgba(20,17,15,.98)); border:1px solid var(--line); border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.28); }
    .hero { padding:24px; display:grid; gap:12px; }
    .hero h1,.panel h2,.query-group h3 { margin:0; color:var(--gold); }
    .hero p,.small,.record-meta,.repair-meta { color:var(--muted); line-height:1.8; }
    .panel { padding:18px; display:grid; gap:14px; }
    .actions,.record-badges,.repair-actions { display:flex; flex-wrap:wrap; gap:10px; }
    .query-groups,.query-group,.record-list,.record-card,.record-title,.repair-wrap,.repair-list,.repair-item { display:grid; gap:12px; }
    .record-card,.repair-item { padding:14px; border-radius:16px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); }
    .record-head,.repair-head { display:flex; flex-wrap:wrap; justify-content:space-between; gap:8px 12px; align-items:flex-start; }
    .record-title strong { color:#ffe2a7; font-size:16px; }
    .record-meta,.repair-meta { font-size:13px; line-height:1.7; }
    .status { padding:12px 14px; border-radius:14px; background:#120f0d; border:1px solid rgba(255,255,255,.08); color:#f2e3c4; }
    .badge { display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .badge.active { background:rgba(83, 194, 116, .16); color:#b8f1c7; border:1px solid rgba(83,194,116,.28); }
    .badge.expired { background:rgba(220, 98, 98, .14); color:#ffc3c3; border:1px solid rgba(220,98,98,.28); }
    .badge.pending { background:rgba(209,176,122,.12); color:#ffe2a7; border:1px solid rgba(209,176,122,.22); }
    .badge.bound { background:rgba(67, 150, 255, .14); color:#cfe1ff; border:1px solid rgba(67,150,255,.26); }
    .badge.unbound { background:rgba(255,255,255,.06); color:#f2e3c4; border:1px solid rgba(255,255,255,.12); }
    .badge.repair-pending { background:rgba(255, 138, 76, .18); color:#ffd3b1; border:1px solid rgba(255,138,76,.28); }
    .badge.repair-completed { background:rgba(140, 180, 255, .14); color:#d3e0ff; border:1px solid rgba(140,180,255,.24); }
    button, a.btn { border:0; border-radius:12px; padding:12px 18px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .primary { background:linear-gradient(180deg,#ecd7ac,#c89f60); color:#22190f; }
    .secondary { background:#2a241f; color:var(--ink); border:1px solid var(--line); }
    .danger { background:#4b1f1f; color:#ffe1e1; border:1px solid rgba(255,120,120,.28); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>查詢保固書</h1>
      <p>這一頁專門用來查看案件、確認 LINE 綁定狀態、查看待處理報修，以及執行修改、刪除與核銷。</p>
      <div class="actions">
        <a class="secondary btn" href="admin.html">回到建立頁</a>
        <button class="primary" type="button" id="refreshBtn">重新整理案件清單</button>
      </div>
    </section>

    <section class="panel">
      <h2>案件清單</h2>
      <div class="status" id="queryStatusBox">載入中｜讀取保固案件、LINE 綁定狀態與報修清單</div>
      <div class="query-groups" id="queryGroups"></div>
    </section>
  </div>

  <script src="api-config.js?v=20260614-repair-query"></script>
  <script>
    function toIsoDate(value) {
      const text = String(value || '').trim();
      const match = /^(\d{4})-(\d{2})-(\d{2})/.exec(text);
      if (match) return `${match[1]}-${match[2]}-${match[3]}`;
      const parsed = new Date(text);
      if (Number.isNaN(parsed.getTime())) return text;
      const year = parsed.getFullYear();
      const month = String(parsed.getMonth() + 1).padStart(2, '0');
      const day = String(parsed.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatDateText(value) {
      const normalized = toIsoDate(value);
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(normalized);
      if (!match) return value || '未提供';
      return `${match[1]}/${match[2]}/${match[3]}`;
    }

    function loadJsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = '__queryCallback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
        const script = document.createElement('script');
        window[callbackName] = (payload) => {
          delete window[callbackName];
          script.remove();
          resolve(payload);
        };
        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error('讀取資料失敗'));
        };
        const separator = url.includes('?') ? '&' : '?';
        script.src = `${url}${separator}callback=${callbackName}`;
        document.body.appendChild(script);
      });
    }

    async function fetchWarrantyList() {
      if (!window.APP_CONFIG || !APP_CONFIG.apiBase) return { success: false, message: '未設定 API' };
      return await loadJsonp(`${APP_CONFIG.apiBase}?action=listWarrantyRecords`);
    }

    async function fetchRepairList() {
      if (!window.APP_CONFIG || !APP_CONFIG.apiBase) return { success: false, message: '未設定 API' };
      return await loadJsonp(`${APP_CONFIG.apiBase}?action=listRepairs`);
    }

    function requestAdminPin(actionLabel) {
      const pin = window.prompt(`${actionLabel}需要輸入管理密碼`, '');
      if (pin === null) return null;
      return String(pin || '').trim();
    }

    function formatBindingText(item) {
      if (item.bindingBound) return `已綁定 LINE：${item.bindingDisplayName || '未命名帳號'}`;
      return '未綁定 LINE（客戶尚未回傳手機號碼）';
    }

    function getStatusBadgeClass(statusKey) {
      if (statusKey === 'active') return 'active';
      if (statusKey === 'expired') return 'expired';
      return 'pending';
    }

    function getRepairStatusLabel(status) {
      return status === 'completed' ? '已完成' : '待處理';
    }

    function getRepairStatusClass(status) {
      return status === 'completed' ? 'repair-completed' : 'repair-pending';
    }

    function groupWarrantyItems(items) {
      return {
        active: (items || []).filter(item => item.statusKey === 'active'),
        expired: (items || []).filter(item => item.statusKey === 'expired'),
        pending: (items || []).filter(item => item.statusKey === 'pending')
      };
    }

    function buildRepairIndex(items) {
      const index = {};
      (items || []).forEach(item => {
        const key = String(item.caseId || '').trim();
        if (!key) return;
        if (!index[key]) index[key] = [];
        index[key].push(item);
      });
      return index;
    }

    function countPendingRepairs(items) {
      return (items || []).filter(item => item.status !== 'completed').length;
    }

    async function redirectToEdit(caseId) {
      const pin = requestAdminPin('修改案件');
      if (pin === null) return;
      if (pin !== (window.APP_CONFIG?.adminSendPin || '521527')) {
        alert('密碼錯誤');
        return;
      }
      sessionStorage.setItem('warranty_admin_edit_case_id', caseId);
      location.href = `admin.html?editCaseId=${encodeURIComponent(caseId)}&from=query`;
    }

    async function deleteWarrantyRecord(caseId) {
      const pin = requestAdminPin(`刪除案件 ${caseId}`);
      if (pin === null) return;
      const confirmed = window.confirm(`確定要刪除案件 ${caseId} 嗎？此動作無法復原。`);
      if (!confirmed) return;
      const result = await loadJsonp(`${APP_CONFIG.apiBase}?action=deleteWarranty&caseId=${encodeURIComponent(caseId)}&pin=${encodeURIComponent(pin)}`);
      if (!result || !result.success) {
        alert(result?.message || '刪除失敗');
        return;
      }
      alert(`已刪除案件 ${caseId}`);
      await loadWarrantyQueryPage();
    }

    async function updateRepairStatus(repairId, status) {
      const pin = requestAdminPin(status === 'completed' ? `核銷報修 ${repairId}` : `更新報修 ${repairId}`);
      if (pin === null) return;
      const result = await loadJsonp(`${APP_CONFIG.apiBase}?action=updateRepairStatus&repairId=${encodeURIComponent(repairId)}&status=${encodeURIComponent(status)}&pin=${encodeURIComponent(pin)}&notifyCustomer=1`);
      if (!result || !result.success) {
        alert(result?.message || '更新失敗');
        return;
      }
      const notifyText = result.notify && result.notify.success
        ? '，並已透過官方 LINE 通知客戶'
        : '；客戶若尚未完成 LINE 綁定，則不會主動推送';
      alert(`報修 ${repairId} 已更新為${getRepairStatusLabel(status)}${notifyText}`);
      await loadWarrantyQueryPage();
    }

    function buildRepairItem(repair) {
      const item = document.createElement('div');
      item.className = 'repair-item';
      item.innerHTML = `
        <div class="repair-head">
          <div>
            <strong>${repair.issueType || '未提供問題類型'}</strong>
            <div class="repair-meta">報修單號：${repair.repairId || '未提供'}｜聯絡人：${repair.contactName || '未提供'}｜電話：${repair.phone || '未提供'}</div>
          </div>
          <div class="record-badges">
            <span class="badge ${getRepairStatusClass(repair.status)}">${getRepairStatusLabel(repair.status)}</span>
          </div>
        </div>
        <div class="repair-meta">
          建立時間：${repair.createdAt || '未提供'}<br>
          最後更新：${repair.updatedAt || '未提供'}<br>
          希望聯絡時段：${repair.preferredContactTime || '未提供'}<br>
          問題描述：${repair.description || '未提供'}
        </div>
        <div class="repair-actions"></div>
      `;
      const actions = item.querySelector('.repair-actions');
      if (repair.status !== 'completed') {
        const doneBtn = document.createElement('button');
        doneBtn.className = 'primary';
        doneBtn.type = 'button';
        doneBtn.textContent = '核銷完成';
        doneBtn.addEventListener('click', async () => {
          await updateRepairStatus(repair.repairId, 'completed');
        });
        actions.appendChild(doneBtn);
      }
      return item;
    }

    function buildRepairWrap(repairs) {
      const wrap = document.createElement('div');
      wrap.className = 'repair-wrap';
      const title = document.createElement('div');
      title.className = 'small';
      title.textContent = `報修紀錄（${repairs.length}）`;
      wrap.appendChild(title);
      const list = document.createElement('div');
      list.className = 'repair-list';
      repairs.forEach(repair => list.appendChild(buildRepairItem(repair)));
      wrap.appendChild(list);
      return wrap;
    }

    function buildRecordCard(item, repairIndex) {
      const repairs = repairIndex[item.caseId] || [];
      const pendingRepairCount = countPendingRepairs(repairs);
      const card = document.createElement('div');
      card.className = 'record-card';
      card.innerHTML = `
        <div class="record-head">
          <div class="record-title">
            <strong>${item.projectName || '未命名案件'}</strong>
            <div class="record-meta">${item.customerName || '未提供客戶'}｜${item.address || '未提供地址'}</div>
          </div>
          <div class="record-badges">
            <span class="badge ${getStatusBadgeClass(item.statusKey)}">${item.statusText || '日期未設定'}</span>
            <span class="badge ${item.bindingBound ? 'bound' : 'unbound'}">${item.bindingBound ? 'LINE 已綁定' : 'LINE 未綁定'}</span>
            ${pendingRepairCount ? `<span class="badge repair-pending">待處理報修 ${pendingRepairCount} 筆</span>` : ''}
          </div>
        </div>
        <div class="record-meta">
          案件編號：${item.caseId || '未提供'}<br>
          客戶電話：${item.customerPhone || '未提供'}<br>
          保固期間：${formatDateText(item.warrantyStart)} 至 ${formatDateText(item.warrantyEnd)}<br>
          綁定狀態：${formatBindingText(item)}
        </div>
        <div class="actions">
          <button class="secondary" type="button" data-action="edit">修改</button>
          <button class="danger" type="button" data-action="delete">刪除</button>
        </div>
      `;
      card.querySelector('[data-action="edit"]').addEventListener('click', async () => {
        await redirectToEdit(item.caseId);
      });
      card.querySelector('[data-action="delete"]').addEventListener('click', async () => {
        await deleteWarrantyRecord(item.caseId);
      });
      if (repairs.length) {
        card.appendChild(buildRepairWrap(repairs));
      }
      return card;
    }

    function renderQueryGroup(title, items, repairIndex) {
      const section = document.createElement('section');
      section.className = 'query-group';
      const heading = document.createElement('h3');
      heading.textContent = `${title}（${items.length}）`;
      section.appendChild(heading);
      const list = document.createElement('div');
      list.className = 'record-list';
      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'status';
        empty.textContent = '目前沒有案件';
        list.appendChild(empty);
      } else {
        items.forEach(item => list.appendChild(buildRecordCard(item, repairIndex)));
      }
      section.appendChild(list);
      return section;
    }

    function renderWarrantyQuery(items, repairIndex) {
      const groups = groupWarrantyItems(items);
      const container = document.getElementById('queryGroups');
      container.innerHTML = '';
      container.appendChild(renderQueryGroup('保固中案件', groups.active, repairIndex));
      container.appendChild(renderQueryGroup('已過保案件', groups.expired, repairIndex));
      if (groups.pending.length) container.appendChild(renderQueryGroup('尚未生效案件', groups.pending, repairIndex));
    }

    async function loadWarrantyQueryPage() {
      const statusBox = document.getElementById('queryStatusBox');
      statusBox.textContent = '載入中｜讀取保固案件、LINE 綁定狀態與報修清單';
      const [warrantyResult, repairResult] = await Promise.all([fetchWarrantyList(), fetchRepairList()]);
      if (!warrantyResult || !warrantyResult.success) {
        statusBox.textContent = warrantyResult?.message || '保固案件載入失敗';
        document.getElementById('queryGroups').innerHTML = '';
        return;
      }
      if (!repairResult || !repairResult.success) {
        statusBox.textContent = repairResult?.message || '報修清單載入失敗';
        document.getElementById('queryGroups').innerHTML = '';
        return;
      }
      const repairs = Array.isArray(repairResult.items) ? repairResult.items : [];
      const repairIndex = buildRepairIndex(repairs);
      const pendingTotal = countPendingRepairs(repairs);
      renderWarrantyQuery(warrantyResult.items || [], repairIndex);
      statusBox.textContent = `已載入 ${(warrantyResult.items || []).length} 筆案件｜待處理報修 ${pendingTotal} 筆`;
    }

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      await loadWarrantyQueryPage();
    });

    loadWarrantyQueryPage().catch((error) => {
      document.getElementById('queryStatusBox').textContent = error.message || '載入失敗';
    });
  </script>
</body>
</html>
