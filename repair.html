<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保固報修</title>
  <style>
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Rg.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Rg.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Bd.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Bd.ttf") format("truetype"); font-weight: 700; font-style: normal; font-display: swap; }
    :root { --bg:#141210; --panel:#1f1b18; --gold:#d1b07a; --ink:#f7efdf; --muted:rgba(247,239,223,.72); --line:rgba(209,176,122,.22); }
    * { box-sizing: border-box; }
    html,body { margin:0; min-height:100%; background:linear-gradient(180deg,#0f0d0c,#181410 48%,#120f0d); color:var(--ink); font-family:"LINE Seed TW","Noto Sans TC","Microsoft JhengHei",sans-serif; }
    body { padding:20px 14px 40px; }
    .wrap { width:min(760px,100%); margin:0 auto; display:grid; gap:18px; }
    .panel { background:linear-gradient(180deg,rgba(37,31,26,.96),rgba(20,17,15,.98)); border:1px solid var(--line); border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.28); padding:20px; }
    h1,h2 { margin:0 0 12px; color:var(--gold); }
    p,.small { color:var(--muted); line-height:1.75; }
    form { display:grid; gap:12px; }
    label { display:grid; gap:6px; font-size:13px; color:var(--muted); }
    input, textarea { width:100%; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:#13110f; color:var(--ink); padding:12px 13px; font:inherit; }
    textarea { min-height:120px; resize:vertical; }
    button { border:0; border-radius:12px; padding:12px 16px; font:inherit; font-weight:700; cursor:pointer; background:linear-gradient(180deg,#ecd7ac,#c89f60); color:#22190f; }
    pre { background:#120f0d; border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:14px; overflow:auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>保固報修頁 MVP</h1>
      <p>這一頁可以從 LINE 卡片的「我要報修」按鈕進來。MVP 階段先支援本機暫存；Apps Script 接好後即可寫入 Google Sheet 的 Repairs 工作表。</p>
    </section>

    <section class="panel">
      <h2>報修表單</h2>
      <form id="repairForm">
        <label>案件編號<input name="caseId" id="caseId" readonly /></label>
        <label>聯絡人<input name="contactName" placeholder="請輸入聯絡人姓名" required /></label>
        <label>聯絡電話<input name="phone" placeholder="請輸入聯絡電話" required /></label>
        <label>問題類型<input name="issueType" placeholder="例如：木作鬆脫 / 五金故障 / 滲水" required /></label>
        <label>問題描述<textarea name="description" placeholder="請描述問題、發生位置、希望聯繫時段" required></textarea></label>
        <button type="submit">送出報修</button>
      </form>
    </section>

    <section class="panel">
      <h2>送出結果</h2>
      <p id="resultText">尚未送出。</p>
      <div class="small">報修 payload</div>
      <pre id="payloadPreview">{}</pre>
    </section>
  </div>

  <script src="api-config.js"></script>
  <script>
    function getCaseId() {
      return new URLSearchParams(location.search).get('id') || '未指定案件';
    }

    function saveLocalRepair(payload) {
      const raw = localStorage.getItem('repair_requests');
      const items = raw ? JSON.parse(raw) : [];
      items.push(payload);
      localStorage.setItem('repair_requests', JSON.stringify(items));
    }

    async function pushToApi(payload) {
      if (!window.APP_CONFIG || !APP_CONFIG.apiBase) throw new Error('api-config.js 尚未設定 apiBase');
      const response = await fetch(APP_CONFIG.apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'createRepair', repair: payload })
      });
      const result = await response.json();
      if (!result.success) throw new Error(result.message || '報修送出失敗');
      return result;
    }

    document.getElementById('caseId').value = getCaseId();

    document.getElementById('repairForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = {
        caseId: form.caseId.value,
        contactName: form.contactName.value.trim(),
        phone: form.phone.value.trim(),
        issueType: form.issueType.value.trim(),
        description: form.description.value.trim(),
        createdAt: new Date().toISOString()
      };
      document.getElementById('payloadPreview').textContent = JSON.stringify(payload, null, 2);
      try {
        saveLocalRepair(payload);
        try {
          await pushToApi(payload);
          document.getElementById('resultText').textContent = '報修已送出至 Apps Script / Google Sheet。';
        } catch (apiError) {
          document.getElementById('resultText').textContent = '已先存本機報修資料；Apps Script 尚未成功串接：' + apiError.message;
        }
        form.reset();
        form.caseId.value = payload.caseId;
      } catch (error) {
        document.getElementById('resultText').textContent = '送出失敗：' + error.message;
      }
    });
  </script>
</body>
</html>
