<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楓根設計電子保固卡後台登入</title>
  <style>
    :root {
      --gold:#d5b06b;
      --ink:#f7efdf;
      --line:rgba(213,176,107,.18);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top, rgba(213,176,107,.1), transparent 24%),
        linear-gradient(180deg,#0b0908,#15110f 55%,#0d0b0a);
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card {
      width:min(560px,100%);
      background:linear-gradient(180deg,rgba(31,25,21,.98),rgba(18,14,12,.98));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 28px 80px rgba(0,0,0,.35);
      padding:34px 30px;
      display:grid;
      gap:20px;
      justify-items:center;
      text-align:center;
    }
    .logo-wrap {
      width:min(100%, 380px);
      display:grid;
      place-items:center;
      padding:8px 0 4px;
    }
    .logo {
      display:block;
      width:100%;
      height:auto;
      filter:drop-shadow(0 10px 24px rgba(0,0,0,.22));
    }
    h1 {
      margin:0;
      color:var(--gold);
      font-size:32px;
      line-height:1.28;
      letter-spacing:.04em;
    }
    .actions {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      width:100%;
    }
    a.btn {
      appearance:none;
      border:0;
      text-decoration:none;
      cursor:pointer;
      border-radius:14px;
      padding:13px 18px;
      font-weight:700;
      font-size:15px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:168px;
      transition:transform .16s ease, box-shadow .16s ease;
    }
    a.btn:hover {
      transform:translateY(-1px);
      box-shadow:0 10px 26px rgba(0,0,0,.18);
    }
    .primary {
      background:linear-gradient(180deg,#f4dfb6,#c99b53);
      color:#20150c;
    }
    .secondary {
      background:#2b231d;
      color:var(--ink);
      border:1px solid rgba(255,255,255,.08);
    }
    @media (max-width: 520px) {
      .card { padding:28px 22px; }
      .logo-wrap { width:min(100%, 320px); }
      h1 { font-size:28px; }
      .actions { flex-direction:column; }
      a.btn { width:100%; min-width:0; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo-wrap">
      <img class="logo" src="assets/fenggen-logo.png" alt="楓根設計 Logo" />
    </div>
    <h1>電子保固卡後台登入</h1>
    <div class="actions">
      <a class="primary btn" href="https://script.google.com/macros/s/AKfycbxK3U_BbLdI335S6vUn_RX93_CzNARuj4upTDVkwySJBtfpNVqNnriKQZm91qJrf1QsIw/exec?page=dashboard" target="_blank" rel="noopener">登入後台</a>
      <a class="secondary btn" href="https://script.google.com/macros/s/AKfycbxK3U_BbLdI335S6vUn_RX93_CzNARuj4upTDVkwySJBtfpNVqNnriKQZm91qJrf1QsIw/exec?page=query" target="_blank" rel="noopener">查詢保固書</a>
    </div>
  </main>
</body>
</html>
