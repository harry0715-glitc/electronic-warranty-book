<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楓根設計電子保固卡後台登入</title>
  <style>
    :root {
      --bg:#0c0908;
      --bg2:#17110e;
      --panel:rgba(28,20,17,.94);
      --panel-strong:rgba(37,27,22,.98);
      --gold:#d8b06d;
      --gold-soft:#f4deb0;
      --ink:#f7efdf;
      --muted:rgba(247,239,223,.68);
      --line:rgba(216,176,109,.18);
      --line-strong:rgba(216,176,109,.3);
      --shadow:0 32px 90px rgba(0,0,0,.42);
    }
    * { box-sizing:border-box; }
    html, body { min-height:100%; }
    body {
      margin:0;
      font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(216,176,109,.18), transparent 22%),
        radial-gradient(circle at 82% 24%, rgba(216,176,109,.08), transparent 20%),
        linear-gradient(180deg, #0a0706 0%, #140f0d 56%, #0a0807 100%);
      display:grid;
      place-items:center;
      padding:28px;
      overflow:hidden;
    }
    body::before,
    body::after {
      content:"";
      position:fixed;
      inset:auto;
      border-radius:999px;
      pointer-events:none;
      filter:blur(10px);
    }
    body::before {
      width:320px;
      height:320px;
      left:-80px;
      bottom:-90px;
      background:radial-gradient(circle, rgba(216,176,109,.14), transparent 72%);
    }
    body::after {
      width:260px;
      height:260px;
      right:-60px;
      top:-60px;
      background:radial-gradient(circle, rgba(216,176,109,.10), transparent 70%);
    }
    .shell {
      width:min(1080px, 100%);
      position:relative;
    }
    .frame {
      position:relative;
      display:grid;
      grid-template-columns:minmax(260px, 340px) minmax(0, 1fr);
      border:1px solid var(--line);
      border-radius:34px;
      background:linear-gradient(180deg, rgba(31,23,19,.97), rgba(18,13,11,.98));
      box-shadow:var(--shadow);
      overflow:hidden;
      min-height:560px;
      isolation:isolate;
    }
    .frame::before {
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 28%),
        linear-gradient(135deg, rgba(216,176,109,.07), transparent 28%, transparent 72%, rgba(216,176,109,.04));
      pointer-events:none;
    }
    .brand-panel {
      position:relative;
      padding:42px 34px;
      background:
        linear-gradient(180deg, rgba(45,32,25,.95), rgba(24,17,14,.98)),
        radial-gradient(circle at top, rgba(216,176,109,.15), transparent 40%);
      border-right:1px solid rgba(216,176,109,.12);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:28px;
    }
    .brand-panel::after {
      content:"";
      position:absolute;
      inset:18px;
      border:1px solid rgba(216,176,109,.08);
      border-radius:24px;
      pointer-events:none;
    }
    .brand-top {
      display:grid;
      gap:22px;
      position:relative;
      z-index:1;
    }
    .brand-mark {
      width:82px;
      height:82px;
      border-radius:26px;
      display:grid;
      place-items:center;
      color:#2b1a10;
      font-weight:800;
      font-size:30px;
      letter-spacing:.08em;
      background:linear-gradient(180deg, #f6e4bc 0%, #d2a45d 100%);
      box-shadow:0 18px 40px rgba(0,0,0,.24);
    }
    .eyebrow {
      display:inline-flex;
      align-items:center;
      width:max-content;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(216,176,109,.18);
      color:var(--gold-soft);
      background:rgba(216,176,109,.06);
      font-size:12px;
      letter-spacing:.22em;
    }
    .brand-title {
      display:grid;
      gap:10px;
    }
    .brand-title h1 {
      margin:0;
      font-size:36px;
      line-height:1.2;
      letter-spacing:.04em;
      color:#f7ecd5;
    }
    .brand-title p {
      margin:0;
      color:var(--gold);
      font-size:18px;
      letter-spacing:.18em;
    }
    .brand-bottom {
      position:relative;
      z-index:1;
      display:grid;
      gap:14px;
    }
    .accent-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }
    .accent-card {
      min-height:108px;
      border-radius:22px;
      border:1px solid rgba(216,176,109,.12);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      position:relative;
      overflow:hidden;
    }
    .accent-card::before,
    .accent-card::after {
      content:"";
      position:absolute;
      border-radius:999px;
    }
    .accent-card::before {
      width:120px;
      height:120px;
      right:-40px;
      top:-32px;
      background:radial-gradient(circle, rgba(216,176,109,.22), transparent 68%);
    }
    .accent-card::after {
      left:18px;
      right:18px;
      bottom:18px;
      height:1px;
      background:linear-gradient(90deg, rgba(216,176,109,.0), rgba(216,176,109,.26), rgba(216,176,109,0));
    }
    .login-panel {
      position:relative;
      display:grid;
      align-items:center;
      padding:42px;
      z-index:1;
    }
    .login-card {
      width:min(560px, 100%);
      margin:0 auto;
      padding:36px;
      border-radius:30px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(36,27,23,.92), rgba(22,16,13,.96));
      box-shadow:0 18px 50px rgba(0,0,0,.22);
      display:grid;
      gap:30px;
    }
    .login-head {
      display:grid;
      gap:10px;
    }
    .login-head .mini {
      color:var(--gold-soft);
      font-size:13px;
      letter-spacing:.22em;
    }
    .login-head h2 {
      margin:0;
      font-size:34px;
      line-height:1.2;
      color:#fff3d6;
      letter-spacing:.04em;
    }
    .login-head strong {
      color:var(--gold);
      font-weight:800;
    }
    .action-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }
    a.action {
      position:relative;
      min-height:170px;
      border-radius:24px;
      text-decoration:none;
      color:var(--ink);
      padding:24px 22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border:1px solid rgba(216,176,109,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease, background .2s ease;
      overflow:hidden;
    }
    a.action::before {
      content:"";
      position:absolute;
      inset:auto -30px -40px auto;
      width:140px;
      height:140px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(216,176,109,.18), transparent 70%);
      pointer-events:none;
    }
    a.action:hover {
      transform:translateY(-4px);
      border-color:rgba(216,176,109,.34);
      box-shadow:0 18px 34px rgba(0,0,0,.22);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
    }
    .action.primary {
      background:linear-gradient(180deg, rgba(244,223,182,.98), rgba(206,161,89,.92));
      color:#2b180f;
      border-color:rgba(255,233,189,.42);
    }
    .action.primary:hover {
      background:linear-gradient(180deg, rgba(248,230,198,1), rgba(214,169,95,.95));
    }
    .action-kicker {
      font-size:13px;
      letter-spacing:.2em;
      opacity:.8;
    }
    .action-title {
      font-size:28px;
      font-weight:800;
      line-height:1.2;
      letter-spacing:.04em;
    }
    .action-arrow {
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-size:24px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      align-self:flex-end;
    }
    .action.primary .action-arrow {
      border-color:rgba(43,24,15,.16);
      background:rgba(255,255,255,.25);
    }
    @media (max-width: 920px) {
      .frame { grid-template-columns:1fr; min-height:auto; }
      .brand-panel { border-right:0; border-bottom:1px solid rgba(216,176,109,.12); }
      .login-panel { padding:28px; }
    }
    @media (max-width: 640px) {
      body { padding:16px; }
      .brand-panel, .login-panel { padding:24px; }
      .login-card { padding:24px; gap:22px; }
      .brand-title h1, .login-head h2 { font-size:28px; }
      .action-grid { grid-template-columns:1fr; }
      .action { min-height:138px; }
      .accent-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="frame">
      <section class="brand-panel">
        <div class="brand-top">
          <div class="brand-mark">FG</div>
          <span class="eyebrow">FENG GEN DESIGN</span>
          <div class="brand-title">
            <h1>楓根設計<br />電子保固卡</h1>
            <p>ADMIN PORTAL</p>
          </div>
        </div>
        <div class="brand-bottom">
          <div class="accent-grid">
            <div class="accent-card"></div>
            <div class="accent-card"></div>
          </div>
        </div>
      </section>

      <section class="login-panel">
        <div class="login-card">
          <div class="login-head">
            <span class="mini">SECURE ACCESS</span>
            <h2>後台<strong>登入入口</strong></h2>
          </div>

          <div class="action-grid">
            <a class="action primary" href="https://script.google.com/macros/s/AKfycbxK3U_BbLdI335S6vUn_RX93_CzNARuj4upTDVkwySJBtfpNVqNnriKQZm91qJrf1QsIw/exec?page=dashboard" target="_blank" rel="noopener">
              <span class="action-kicker">DASHBOARD</span>
              <span class="action-title">登入後台</span>
              <span class="action-arrow">↗</span>
            </a>

            <a class="action" href="https://script.google.com/macros/s/AKfycbxK3U_BbLdI335S6vUn_RX93_CzNARuj4upTDVkwySJBtfpNVqNnriKQZm91qJrf1QsIw/exec?page=query" target="_blank" rel="noopener">
              <span class="action-kicker">WARRANTY QUERY</span>
              <span class="action-title">查詢保固書</span>
              <span class="action-arrow">↗</span>
            </a>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
