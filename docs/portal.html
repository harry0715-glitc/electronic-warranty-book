<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楓根後台入口</title>
  <style>
    :root { --bg:#0e0c0b; --panel:#191512; --gold:#d5b06b; --ink:#f7efdf; --muted:rgba(247,239,223,.72); --line:rgba(213,176,107,.18); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif; color:var(--ink); background:radial-gradient(circle at top, rgba(213,176,107,.1), transparent 24%), linear-gradient(180deg,#0b0908,#15110f 55%,#0d0b0a); display:grid; place-items:center; padding:24px; }
    .card { width:min(760px,100%); background:linear-gradient(180deg,rgba(31,25,21,.98),rgba(18,14,12,.98)); border:1px solid var(--line); border-radius:28px; box-shadow:0 28px 80px rgba(0,0,0,.35); padding:30px; display:grid; gap:22px; }
    h1 { margin:0; color:var(--gold); font-size:34px; }
    p { margin:0; line-height:1.8; color:var(--muted); }
    .actions { display:flex; flex-wrap:wrap; gap:12px; }
    a.btn { appearance:none; border:0; text-decoration:none; cursor:pointer; border-radius:14px; padding:14px 18px; font-weight:700; font-size:16px; display:inline-flex; align-items:center; justify-content:center; }
    .primary { background:linear-gradient(180deg,#f4dfb6,#c99b53); color:#20150c; }
    .secondary { background:#2b231d; color:var(--ink); border:1px solid rgba(255,255,255,.08); }
    .note { padding:16px 18px; border-radius:18px; background:rgba(213,176,107,.08); border:1px solid rgba(213,176,107,.18); color:#f3e4c5; }
    ul { margin:0; padding-left:1.2em; display:grid; gap:6px; color:#f1e3c7; }
  </style>
</head>
<body>
  <main class="card">
    <div>
      <h1>楓根後台登入入口</h1>
    </div>
    <div class="actions">
      <a class="primary btn" href="dashboard.html">登入後台</a>
    </div>
  </main>
</body>
</html>
