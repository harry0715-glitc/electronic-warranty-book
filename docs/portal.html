<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楓根後台入口</title>
  <style>
    :root { --bg:#0e0c0b; --panel:#191512; --gold:#d5b06b; --ink:#f7efdf; --muted:rgba(247,239,223,.72); --line:rgba(213,176,107,.18); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif; color:var(--ink); background:radial-gradient(circle at top, rgba(213,176,107,.1), transparent 24%), linear-gradient(180deg,#0b0908,#15110f 55%,#0d0b0a); display:grid; place-items:center; padding:24px; }
    .card { width:min(760px,100%); background:linear-gradient(180deg,rgba(31,25,21,.98),rgba(18,14,12,.98)); border:1px solid var(--line); border-radius:28px; box-shadow:0 28px 80px rgba(0,0,0,.35); padding:30px; display:grid; gap:22px; }
    h1 { margin:0; color:var(--gold); font-size:34px; }
    p { margin:0; line-height:1.8; color:var(--muted); }
    .actions { display:flex; flex-wrap:wrap; gap:12px; }
    a.btn { appearance:none; border:0; text-decoration:none; cursor:pointer; border-radius:14px; padding:14px 18px; font-weight:700; font-size:16px; display:inline-flex; align-items:center; justify-content:center; }
    .primary { background:linear-gradient(180deg,#f4dfb6,#c99b53); color:#20150c; }
    .secondary { background:#2b231d; color:var(--ink); border:1px solid rgba(255,255,255,.08); }
    .note { padding:16px 18px; border-radius:18px; background:rgba(213,176,107,.08); border:1px solid rgba(213,176,107,.18); color:#f3e4c5; }
    ul { margin:0; padding-left:1.2em; display:grid; gap:6px; color:#f1e3c7; }
  </style>
</head>
<body>
  <main class="card">
    <div>
      <h1>楓根後台登入入口</h1>
    </div>
    <div class="actions">
      <a class="primary btn" href="dashboard.html" target="_blank" rel="noopener">登入後台</a>
      <a class="secondary btn" href="query.html" target="_blank" rel="noopener">查詢保固書</a>
    </div>
      <div class="note">
      <ul>
        <li>若入口網址帶有 <code>adminKey</code>，本頁會自動保存並帶入後台，不用每頁重打。</li>
        <li>保存後會沿用同一個瀏覽器分頁 / 視窗的登入狀態。</li>
      </ul>
    </div>
  </main>
  <script>
    (function () {
      function normalizeKey(value) {
        return String(value || '').trim();
      }
      function readHashParam(name) {
        var hash = String(location.hash || '');
        if (!hash) return '';
        var raw = hash.charAt(0) === '#' ? hash.slice(1) : hash;
        var params = new URLSearchParams(raw);
        return normalizeKey(params.get(name));
      }
      var query = new URLSearchParams(location.search || '');
      var urlAdminKey = normalizeKey(query.get('adminKey') || readHashParam('adminKey'));
      var storedAdminKey = normalizeKey(sessionStorage.getItem('warranty_admin_api_key') || '');
      var adminKey = urlAdminKey || storedAdminKey;
      if (adminKey) sessionStorage.setItem('warranty_admin_api_key', adminKey);
      Array.prototype.forEach.call(document.querySelectorAll('.actions a[href]'), function (link) {
        var href = String(link.getAttribute('href') || '').trim();
        if (!href || /^https?:/i.test(href)) return;
        var target = new URL(href, location.href);
        if (adminKey) target.searchParams.set('adminKey', adminKey);
        link.setAttribute('href', target.pathname.split('/').pop() + target.search);
      });
      if (urlAdminKey && window.history && window.history.replaceState) {
        query.delete('adminKey');
        var cleanSearch = query.toString();
        history.replaceState(null, document.title, location.pathname + (cleanSearch ? '?' + cleanSearch : ''));
      }
    })();
  </script>
</body>
</html>
