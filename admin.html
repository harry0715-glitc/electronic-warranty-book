<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電子保固書建立</title>
  <style>
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Rg.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Rg.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Bd.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Bd.ttf") format("truetype"); font-weight: 700; font-style: normal; font-display: swap; }
    :root { --bg:#141210; --panel:#1f1b18; --panel2:#171311; --gold:#d1b07a; --ink:#f7efdf; --muted:rgba(247,239,223,.72); --line:rgba(209,176,122,.22); }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background:linear-gradient(180deg,#0f0d0c,#181410 48%,#120f0d); color:var(--ink); font-family:"LINE Seed TW","Noto Sans TC","Microsoft JhengHei",sans-serif; }
    body { padding:20px 14px 40px; }
    .wrap { width:min(980px,100%); margin:0 auto; display:grid; gap:18px; }
    .hero,.panel { background:linear-gradient(180deg,rgba(37,31,26,.96),rgba(20,17,15,.98)); border:1px solid var(--line); border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.28); }
    .hero { padding:24px; display:grid; gap:10px; }
    .hero h1 { margin:0; color:var(--gold); font-size:30px; }
    .hero p,.hint,.small { margin:0; color:var(--muted); line-height:1.8; }
    .steps { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-top:4px; }
    .step { padding:12px 14px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); }
    .step strong { display:block; color:var(--gold); margin-bottom:4px; }
    .panel { padding:18px; }
    .panel h2 { margin:0 0 14px; color:var(--gold); font-size:18px; }
    form { display:grid; gap:14px; }
    .fields { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .field, .field-full { display:grid; gap:6px; }
    .field-full { grid-column:1 / -1; }
    label { font-size:13px; color:var(--muted); }
    input, textarea { width:100%; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:#13110f; color:var(--ink); padding:12px 13px; font:inherit; }
    textarea { min-height:108px; resize:vertical; }
    .form-note { padding:12px 14px; border-radius:14px; background:rgba(209,176,122,.08); border:1px solid rgba(209,176,122,.18); color:#f2e3c4; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; }
    button { border:0; border-radius:12px; padding:12px 18px; font:inherit; font-weight:700; cursor:pointer; }
    .primary { background:linear-gradient(180deg,#ecd7ac,#c89f60); color:#22190f; }
    .secondary { background:#2a241f; color:var(--ink); border:1px solid var(--line); }
    .status { padding:12px 14px; border-radius:14px; background:#120f0d; border:1px solid rgba(255,255,255,.08); color:#f2e3c4; }
    .result { display:grid; gap:10px; }
    .hidden { display:none !important; }
    @media (max-width: 900px) { .fields,.steps { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>電子保固書建立</h1>
      <p>依你指定的流程，這裡只輸入基本資訊。送出後會直接跳到完整保固書頁，下方只保留 <strong>我要報修</strong> 與 <strong>分享給 LINE 好友</strong>。</p>
      <div class="steps">
        <div class="step"><strong>1. 輸入基本資訊</strong><span>不手動輸入案件編號，系統自動排序產生。</span></div>
        <div class="step"><strong>2. 直接預覽保固書</strong><span>送出後直接打開完整正式文件頁。</span></div>
        <div class="step"><strong>3. 分享給好友</strong><span>在保固書頁下方用 LINE 分享 Flex 卡片。</span></div>
      </div>
    </section>

    <section class="panel">
      <h2>基本資訊</h2>
      <form id="warrantyForm">
        <div class="form-note">保固狀態不需輸入，會依保固起迄日期自動判定。客服按鈕與備註欄已移除。</div>
        <div class="fields">
          <div class="field"><label>案件名稱</label><input name="projectName" value="楠梓 四季心 B7/6F" required /></div>
          <div class="field"><label>客戶名稱</label><input name="customerName" value="王先生" required /></div>
          <div class="field"><label>客戶電話</label><input name="customerPhone" value="0912-345-678" required /></div>
          <div class="field"><label>工程地點</label><input name="address" value="高雄市楠梓區右昌街 358 號 6 樓之 7" required /></div>
          <div class="field-full"><label>承攬範圍</label><input name="scope" value="如契約書（報價單內容）" required /></div>
          <div class="field"><label>竣工日期</label><input type="date" name="completionDate" value="2026-06-13" required /></div>
          <div class="field"><label>驗收日期</label><input type="date" name="acceptanceDate" value="2026-06-13" required /></div>
          <div class="field"><label>保固起日</label><input type="date" name="warrantyStart" value="2026-06-13" required /></div>
          <div class="field"><label>保固迄日</label><input type="date" name="warrantyEnd" value="2027-06-12" required /></div>
          <div class="field-full"><label>結算金額</label><input name="amount" value="新台幣 陸拾壹萬伍仟 元整（615,000 元）" required /></div>
          <div class="field"><label>承攬廠商</label><input name="issuerCompany" value="楓根室內裝修設計有限公司" required /></div>
          <div class="field"><label>負責人</label><input name="issuerResponsiblePerson" value="林 榮 祥" required /></div>
          <div class="field-full"><label>公司地址</label><input name="issuerAddress" value="高雄市楠梓區清成街 31 號" required /></div>
          <div class="field-full"><label>保固聲明</label><textarea name="warrantyStatement" required>上列工程自驗收合格之日起計算，在保固期內，如發生局部或全部損壞時，本公司願負完全修復責任（如遇天災及不可抗拒因素或人為之故意行為，則不在此限），並拋棄先訴抗辯權，僅此聲明。</textarea></div>
        </div>
        <div class="actions">
          <button class="primary" type="submit">建立並開啟完整保固書</button>
          <button class="secondary" type="button" id="saveOnlyBtn">只儲存草稿</button>
        </div>
      </form>
    </section>

    <section class="panel hidden" id="resultPanel">
      <h2>已建立草稿</h2>
      <div class="result">
        <div class="status" id="statusBox"></div>
        <div class="small">你也可以直接打開剛建立的完整保固書頁：</div>
        <div class="status"><a id="warrantyLink" href="#" target="_blank" style="color:#ffe2a7;word-break:break-all;">尚未建立</a></div>
      </div>
    </section>
  </div>

  <script src="api-config.js"></script>
  <script>
    function getBaseUrl() {
      if (window.APP_CONFIG && APP_CONFIG.publicBase) return APP_CONFIG.publicBase.replace(/\/$/, '');
      return location.origin + location.pathname.replace(/\/[^/]*$/, '');
    }

    function getCases() {
      try { return JSON.parse(localStorage.getItem('warranty_cases') || '{}'); }
      catch (error) { return {}; }
    }

    function setCases(cases) {
      localStorage.setItem('warranty_cases', JSON.stringify(cases));
    }

    function nextCaseId() {
      const year = new Date().getFullYear();
      const prefix = `WG-${year}-`;
      const numbers = Object.keys(getCases())
        .filter(key => key.startsWith(prefix))
        .map(key => Number(key.slice(prefix.length)))
        .filter(num => Number.isFinite(num));
      const next = (numbers.length ? Math.max(...numbers) : 0) + 1;
      return prefix + String(next).padStart(3, '0');
    }

    function toIsoDate(value) {
      return (value || '').trim();
    }

    function deriveStatusText(start, end) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const startDate = new Date(start + 'T00:00:00');
      const endDate = new Date(end + 'T00:00:00');
      if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) return '日期未設定';
      if (today < startDate) return '尚未生效';
      if (today > endDate) return '已過保';
      return '保固生效中';
    }

    function buildRecord(form) {
      const caseId = nextCaseId();
      const baseUrl = getBaseUrl();
      const warrantyStart = toIsoDate(form.warrantyStart.value);
      const warrantyEnd = toIsoDate(form.warrantyEnd.value);
      return {
        caseId,
        statusText: deriveStatusText(warrantyStart, warrantyEnd),
        projectName: form.projectName.value.trim(),
        customerName: form.customerName.value.trim(),
        customerPhone: form.customerPhone.value.trim(),
        address: form.address.value.trim(),
        scope: form.scope.value.trim(),
        completionDate: toIsoDate(form.completionDate.value),
        amount: form.amount.value.trim(),
        acceptanceDate: toIsoDate(form.acceptanceDate.value),
        warrantyStart,
        warrantyEnd,
        warrantyStatement: form.warrantyStatement.value.trim(),
        issuer: {
          company: form.issuerCompany.value.trim(),
          responsiblePerson: form.issuerResponsiblePerson.value.trim(),
          address: form.issuerAddress.value.trim()
        },
        repairUrl: (window.APP_CONFIG && APP_CONFIG.repairOfficialUrl) || `${baseUrl}/repair.html?id=${encodeURIComponent(caseId)}`,
        warrantyUrl: `${baseUrl}/index.html?id=${encodeURIComponent(caseId)}`
      };
    }

    function saveRecord(record) {
      const cases = getCases();
      cases[record.caseId] = record;
      setCases(cases);
      return record;
    }

    function showSaved(record, modeText) {
      document.getElementById('resultPanel').classList.remove('hidden');
      document.getElementById('statusBox').textContent = `${modeText}｜案件編號 ${record.caseId}｜狀態 ${record.statusText}`;
      const link = document.getElementById('warrantyLink');
      link.href = record.warrantyUrl;
      link.textContent = record.warrantyUrl;
    }

    async function pushToApi(record) {
      if (!window.APP_CONFIG || !APP_CONFIG.apiBase) return;
      try {
        const form = new URLSearchParams();
        form.set('action', 'createWarranty');
        form.set('caseId', record.caseId || '');
        form.set('projectName', record.projectName || '');
        form.set('customerName', record.customerName || '');
        form.set('customerPhone', record.customerPhone || '');
        form.set('address', record.address || '');
        form.set('scope', record.scope || '');
        form.set('completionDate', record.completionDate || '');
        form.set('amount', record.amount || '');
        form.set('acceptanceDate', record.acceptanceDate || '');
        form.set('warrantyStart', record.warrantyStart || '');
        form.set('warrantyEnd', record.warrantyEnd || '');
        form.set('warrantyStatement', record.warrantyStatement || '');
        form.set('issuerCompany', record.issuer?.company || '');
        form.set('issuerResponsiblePerson', record.issuer?.responsiblePerson || '');
        form.set('issuerAddress', record.issuer?.address || '');
        form.set('repairUrl', record.repairUrl || '');
        form.set('warrantyUrl', record.warrantyUrl || '');
        await fetch(APP_CONFIG.apiBase, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: form.toString()
        });
      } catch (error) {
        console.warn('pushToApi failed', error);
      }
    }

    const form = document.getElementById('warrantyForm');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const record = saveRecord(buildRecord(form));
      showSaved(record, '已建立並準備開啟完整保固書');
      await pushToApi(record);
      location.href = record.warrantyUrl + '&from=admin';
    });

    document.getElementById('saveOnlyBtn').addEventListener('click', async () => {
      const record = saveRecord(buildRecord(form));
      showSaved(record, '已儲存草稿');
      await pushToApi(record);
    });
  </script>
</body>
</html>
