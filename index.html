<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楓根室內裝修設計有限公司｜電子保固書</title>
  <meta name="description" content="電子保固書動態顯示頁，可依案件 ID 顯示完整保固內容，並提供報修與 LINE 分享入口。" />
  <style>
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Rg.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Rg.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: "LINE Seed TW"; src: url("assets/fonts/LINESeedTW_Bd.woff2") format("woff2"), url("assets/fonts/LINESeedTW_TTF_Bd.ttf") format("truetype"); font-weight: 700; font-style: normal; font-display: swap; }
    :root {
      --paper:#fffdfa; --ink:#1d1814; --ink-soft:#4e4740; --line:#847b72; --line-soft:rgba(132,123,114,0.26);
      --gold:#9b7a43; --shadow:0 24px 60px rgba(38,28,20,0.12); --radius-lg:22px; --radius-md:14px; --paper-width:860px;
      --font-ui:"LINE Seed TW","Noto Serif TC","PMingLiU","PingFang TC","Microsoft JhengHei",serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin:0; min-height:100%; color:var(--ink); font-family:var(--font-ui);
      background:radial-gradient(circle at top, rgba(155,122,67,0.08), transparent 22%), linear-gradient(180deg, #f4f1eb 0%, #ebe6de 100%);
    }
    body { padding:20px 14px 40px; }
    .page-wrap { width:min(1120px,100%); margin:0 auto; display:grid; gap:20px; }
    .top-note { display:flex; justify-content:space-between; gap:12px; align-items:center; color:var(--ink-soft); font-size:13px; padding:0 4px; }
    .status-chip { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; border:1px solid rgba(155,122,67,0.24); background:rgba(255,255,255,0.56); color:#6f5528; font-weight:700; }
    .status-chip::before { content:""; width:8px; height:8px; border-radius:50%; background:#5d8a47; box-shadow:0 0 0 4px rgba(93,138,71,0.12); }
    .paper { width:min(var(--paper-width),100%); margin:0 auto; background:var(--paper); border:1.25px solid var(--line); box-shadow:var(--shadow); }
    .paper-title { text-align:center; padding:28px 24px 24px; border-bottom:1px solid var(--line); }
    .paper-title h1 { margin:0; font-size:clamp(34px,5vw,54px); letter-spacing:0.18em; font-weight:400; }
    .meta-table { display:grid; grid-template-columns:188px 1fr; }
    .meta-row { display:contents; }
    .meta-label,.meta-value { min-height:84px; border-bottom:1px solid var(--line); display:flex; align-items:center; padding:18px; font-size:18px; line-height:1.65; }
    .meta-label { justify-content:center; text-align:center; border-right:1px solid var(--line); letter-spacing:0.12em; background:rgba(0,0,0,0.008); white-space:nowrap; }
    .meta-value strong { font-size:20px; font-weight:700; letter-spacing:0.03em; }
    .statement { border-bottom:1px solid var(--line); padding:18px 34px 26px; }
    .statement p { margin:0; font-size:18px; line-height:2.05; text-indent:2em; letter-spacing:0.04em; }
    .issuer { display:grid; grid-template-columns:1fr auto; gap:24px; align-items:end; padding:26px 34px; }
    .issuer-lines { display:grid; gap:18px; font-size:18px; line-height:1.7; }
    .issuer-line strong { font-weight:400; letter-spacing:0.08em; }
    .seals { display:flex; align-items:end; gap:16px; padding-right:20px; flex-wrap:wrap; justify-content:center; }
    .seal { border:3px solid #d64539; color:#d64539; background:rgba(214,69,57,0.04); display:grid; place-items:center; text-align:center; font-weight:700; line-height:1.05; }
    .seal-main { width:110px; height:110px; font-size:21px; letter-spacing:0.06em; }
    .seal-sub { width:66px; height:66px; font-size:16px; letter-spacing:0.08em; margin-bottom:6px; }
    .paper-date { display:flex; justify-content:center; gap:26px; padding:26px 20px 30px; font-size:18px; letter-spacing:0.48em; }
    .digital-grid { width:min(var(--paper-width),100%); margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .card { background:rgba(255,255,255,0.78); border:1px solid var(--line-soft); border-radius:var(--radius-lg); box-shadow:0 10px 30px rgba(38,28,20,0.06); padding:18px; }
    .card h2 { margin:0 0 12px; font-size:18px; color:#6f5528; letter-spacing:0.08em; }
    .card p { margin:0; color:var(--ink-soft); line-height:1.8; font-size:14px; }
    .list { display:grid; gap:10px; }
    .list-item { padding:12px 14px; border:1px solid rgba(132,123,114,0.18); border-radius:var(--radius-md); background:rgba(255,255,255,0.72); }
    .list-item strong { display:block; margin-bottom:4px; font-size:15px; }
    .list-item span { font-size:13px; line-height:1.7; color:var(--ink-soft); }
    .action-row { display:grid; grid-template-columns:1fr; gap:10px; margin-top:14px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:46px; border-radius:12px; text-decoration:none; font-size:14px; font-weight:700; letter-spacing:0.05em; transition:transform .15s ease, box-shadow .15s ease; border:0; cursor:pointer; }
    .btn:hover { transform:translateY(-1px); }
    .btn-primary { background:linear-gradient(180deg, #aa8660 0%, #8d6a40 100%); color:#fffaf3; box-shadow:0 8px 20px rgba(141,106,64,0.18); }
    .btn-secondary { border:1px solid rgba(132,123,114,0.22); color:var(--ink); background:rgba(255,255,255,0.74); }
    .hint { margin-top:10px; font-size:12px; color:rgba(78,71,64,0.78); line-height:1.8; }
    .footer-note { width:min(var(--paper-width),100%); margin:0 auto; color:rgba(78,71,64,0.82); font-size:12px; line-height:1.8; padding:0 6px; }
    .loading,.error-box { width:min(var(--paper-width),100%); margin:0 auto; padding:18px; border-radius:16px; background:rgba(255,255,255,0.75); border:1px solid rgba(132,123,114,0.2); }
    .hidden { display:none !important; }
    @media (max-width:900px) { .meta-table { grid-template-columns:150px 1fr; } .meta-label,.meta-value,.statement p,.issuer-lines,.paper-date { font-size:16px; } .digital-grid { grid-template-columns:1fr; } }
    @media (max-width:640px) {
      body { padding:12px 8px 28px; }
      .top-note { flex-direction:column; align-items:flex-start; }
      .paper-title { padding:20px 12px 18px; }
      .paper-title h1 { letter-spacing:0.1em; }
      .meta-table { grid-template-columns:112px 1fr; }
      .meta-label,.meta-value { min-height:68px; padding:12px 10px; font-size:14px; line-height:1.55; }
      .meta-value strong { font-size:16px; }
      .statement { padding:14px 16px 18px; }
      .statement p { font-size:15px; line-height:1.9; }
      .issuer { grid-template-columns:1fr; gap:18px; padding:18px 16px 20px; }
      .issuer-lines { gap:12px; font-size:15px; }
      .seals { justify-content:flex-start; padding-right:0; }
      .seal-main { width:88px; height:88px; font-size:18px; }
      .seal-sub { width:58px; height:58px; font-size:13px; }
      .paper-date { gap:12px; flex-wrap:wrap; padding:18px 12px 22px; font-size:15px; letter-spacing:0.2em; }
      .card { padding:14px; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="top-note">
      <div id="subNote">動態電子保固書 / 可由管理頁建立案件</div>
      <div class="status-chip" id="statusChip">載入中</div>
    </div>

    <div id="loadingBox" class="loading">正在載入保固書資料…</div>
    <div id="errorBox" class="error-box hidden"></div>

    <section class="paper hidden" id="paperRoot" aria-label="電子保固書主文件">
      <header class="paper-title"><h1 id="docTitle">保固切結書</h1></header>
      <div class="meta-table" id="metaTable"></div>
      <section class="statement"><p id="warrantyStatement"></p></section>
      <section class="issuer">
        <div class="issuer-lines" id="issuerLines"></div>
        <div class="seals">
          <div class="seal seal-main">楓根室內<br>裝修設計</div>
          <div class="seal seal-sub" id="sealPerson">林榮祥</div>
        </div>
      </section>
      <footer class="paper-date" id="rocDate"></footer>
    </section>

    <section class="digital-grid hidden" id="digitalGrid">
      <article class="card">
        <h2>案件摘要</h2>
        <div class="list" id="summaryList"></div>
      </article>
      <article class="card">
        <h2>分享與服務</h2>
        <p>保固書確認無誤後，可直接報修，或在 LINE 內將同一張 Flex 卡片分享給好友。</p>
        <div class="action-row">
          <a id="repairLink" class="btn btn-primary" href="#">我要報修</a>
          <button id="lineShareBtn" class="btn btn-secondary" type="button">分享給 LINE 好友</button>
        </div>
        <div class="hint" id="shareHint">若要直接送出 Flex 卡片，請在 LINE 內開啟，並於 `api-config.js` 設定 `liffId`。</div>
      </article>
    </section>

    <div class="footer-note hidden" id="footerNote"></div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="api-config.js"></script>
  <script>
    const FIELDS = [
      { label: '案件名稱', key: 'projectName' },
      { label: '工程地點', key: 'address' },
      { label: '承攬範圍', key: 'scope' },
      { label: '竣工日期', key: 'completionDate' },
      { label: '結算金額', key: 'amount' },
      { label: '驗收合格日期', key: 'acceptanceDate', emphasize: true },
      { label: '保固日期', key: 'warrantyRange', emphasize: true }
    ];
    let currentRecord = null;

    function getQueryParam(name) { return new URLSearchParams(location.search).get(name); }

    function readLocalCase(caseId) {
      try {
        const raw = localStorage.getItem('warranty_cases');
        if (!raw) return null;
        const cases = JSON.parse(raw);
        return cases[caseId] || null;
      } catch (error) { return null; }
    }

    function loadJsonp(caseId) {
      return new Promise((resolve, reject) => {
        const apiBase = window.APP_CONFIG && APP_CONFIG.apiBase;
        if (!apiBase) return reject(new Error('未設定 API'));
        const callbackName = '__warrantyCallback_' + Date.now();
        const script = document.createElement('script');
        window[callbackName] = (payload) => {
          delete window[callbackName]; script.remove();
          if (payload && payload.success && payload.warranty) resolve(payload.warranty);
          else reject(new Error(payload && payload.message ? payload.message : 'API 無資料'));
        };
        script.onerror = () => { delete window[callbackName]; script.remove(); reject(new Error('無法讀取 Apps Script 資料')); };
        script.src = apiBase + '?action=getWarranty&id=' + encodeURIComponent(caseId) + '&callback=' + callbackName;
        document.body.appendChild(script);
      });
    }

    async function loadFallbackSample() {
      const response = await fetch('warranty-data.sample.json');
      if (!response.ok) throw new Error('無法讀取樣板資料');
      return response.json();
    }

    function formatIsoDateToRoc(isoText) {
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(isoText || '');
      if (!match) return isoText || '未設定';
      const year = String(Number(match[1]) - 1911);
      return `${year} 年 ${match[2]} 月 ${match[3]} 日`;
    }

    function toRocDateParts(isoText) {
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(isoText || '');
      if (!match) return ['中華民國', '115 年', '06 月', '13 日'];
      return ['中華民國', String(Number(match[1]) - 1911) + ' 年', match[2] + ' 月', match[3] + ' 日'];
    }

    function deriveStatusText(start, end) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const startDate = new Date((start || '') + 'T00:00:00');
      const endDate = new Date((end || '') + 'T00:00:00');
      if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) return '日期未設定';
      if (today < startDate) return '尚未生效';
      if (today > endDate) return '已過保';
      return '保固生效中';
    }

    function makeWarrantyRange(data) {
      return data.warrantyStart && data.warrantyEnd ? (formatIsoDateToRoc(data.warrantyStart) + ' 至 ' + formatIsoDateToRoc(data.warrantyEnd)) : '未設定';
    }

    function buildFlex(record) {
      return {
        type: 'flex',
        altText: `${record.projectName}｜電子保固書`,
        contents: {
          type: 'bubble',
          size: 'mega',
          body: {
            type: 'box',
            layout: 'vertical',
            spacing: 'md',
            contents: [
              { type: 'text', text: '電子保固書', weight: 'bold', size: 'xl', color: '#D4B071' },
              { type: 'text', text: record.projectName, wrap: true, size: 'md', color: '#F6ECD8', weight: 'bold' },
              { type: 'text', text: `案件編號｜${record.caseId}\n保固期間｜${formatIsoDateToRoc(record.warrantyStart)} 至 ${formatIsoDateToRoc(record.warrantyEnd)}\n狀態｜${record.statusText}`, wrap: true, size: 'sm', color: '#D2C7B6' }
            ],
            backgroundColor: '#1A1614'
          },
          footer: {
            type: 'box', layout: 'vertical', spacing: 'sm', contents: [
              { type: 'button', style: 'primary', color: '#D4B071', action: { type: 'uri', label: '查看完整保固書', uri: record.warrantyUrl || location.href } },
              { type: 'button', style: 'secondary', action: { type: 'uri', label: '我要報修', uri: record.repairUrl || ('repair.html?id=' + encodeURIComponent(record.caseId || '')) } }
            ]
          }
        }
      };
    }

    async function shareViaLine(record) {
      const btn = document.getElementById('lineShareBtn');
      const hint = document.getElementById('shareHint');
      if (!window.liff || !APP_CONFIG.liffId) {
        hint.textContent = '尚未設定 LIFF。請先在 api-config.js 填入 liffId，才能直接分享 Flex 卡片。';
        return;
      }
      try {
        btn.disabled = true;
        hint.textContent = '正在啟動 LINE 分享…';
        if (!liff.isLoggedIn()) liff.login();
        await liff.init({ liffId: APP_CONFIG.liffId });
        if (!liff.isInClient() || !liff.isApiAvailable('shareTargetPicker')) {
          hint.textContent = '請在 LINE App 內開啟此頁，才能直接分享 Flex 卡片。';
          return;
        }
        await liff.shareTargetPicker([buildFlex(record)]);
        hint.textContent = '已開啟 LINE 分享選擇器。';
      } catch (error) {
        hint.textContent = 'LINE 分享失敗：' + error.message;
      } finally {
        btn.disabled = false;
      }
    }

    function render(data, sourceLabel) {
      const normalized = {
        ...data,
        statusText: deriveStatusText(data.warrantyStart, data.warrantyEnd),
        warrantyRange: makeWarrantyRange(data),
        completionDate: formatIsoDateToRoc(data.completionDate),
        acceptanceDate: formatIsoDateToRoc(data.acceptanceDate),
        issuer: data.issuer || {}
      };
      normalized.warrantyUrl = normalized.warrantyUrl || location.href;
      normalized.repairUrl = normalized.repairUrl || ('repair.html?id=' + encodeURIComponent(normalized.caseId || ''));
      currentRecord = normalized;

      document.getElementById('subNote').textContent = sourceLabel;
      document.getElementById('statusChip').textContent = normalized.statusText || '保固生效中';
      document.getElementById('warrantyStatement').textContent = normalized.warrantyStatement || '';
      document.getElementById('sealPerson').textContent = (normalized.issuer.responsiblePerson || '負責人').replace(/\s+/g, '');
      document.getElementById('footerNote').textContent = '案件編號：' + (normalized.caseId || '未設定') + '｜來源：' + sourceLabel;

      document.getElementById('metaTable').innerHTML = FIELDS.map(field => {
        const value = normalized[field.key] || '—';
        return '<div class="meta-row"><div class="meta-label">' + field.label + '</div><div class="meta-value">' + (field.emphasize ? ('<strong>' + value + '</strong>') : value) + '</div></div>';
      }).join('');

      document.getElementById('issuerLines').innerHTML = [
        ['承攬廠商', normalized.issuer.company || APP_CONFIG.companyName || '—'],
        ['負責人', normalized.issuer.responsiblePerson || '—'],
        ['地址', normalized.issuer.address || APP_CONFIG.companyAddress || '—']
      ].map(item => '<div class="issuer-line"><strong>' + item[0] + '：</strong>' + item[1] + '</div>').join('');

      document.getElementById('rocDate').innerHTML = toRocDateParts(data.acceptanceDate).map(item => '<span>' + item + '</span>').join('');

      document.getElementById('summaryList').innerHTML = [
        ['案件編號', normalized.caseId],
        ['客戶名稱', normalized.customerName],
        ['客戶電話', normalized.customerPhone],
        ['保固狀態', normalized.statusText],
        ['保固到期', formatIsoDateToRoc(data.warrantyEnd)]
      ].map(item => '<div class="list-item"><strong>' + (item[0] || '') + '</strong><span>' + (item[1] || '—') + '</span></div>').join('');

      document.getElementById('repairLink').href = normalized.repairUrl;
      document.getElementById('loadingBox').classList.add('hidden');
      document.getElementById('paperRoot').classList.remove('hidden');
      document.getElementById('digitalGrid').classList.remove('hidden');
      document.getElementById('footerNote').classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('loadingBox').classList.add('hidden');
      const box = document.getElementById('errorBox');
      box.classList.remove('hidden');
      box.textContent = message;
    }

    async function main() {
      const caseId = getQueryParam('id');
      try {
        if (caseId) {
          const local = readLocalCase(caseId);
          if (local) return render(local, '本機管理頁草稿 / localStorage');
          if (window.APP_CONFIG && APP_CONFIG.apiBase) {
            const remote = await loadJsonp(caseId);
            return render(remote, 'Apps Script / Google Sheet');
          }
        }
        const sample = await loadFallbackSample();
        render(sample, caseId ? '找不到案件，改顯示樣板資料' : '樣板資料預覽');
      } catch (error) {
        showError('載入失敗：' + error.message);
      }
    }

    document.getElementById('lineShareBtn').addEventListener('click', () => {
      if (!currentRecord) return;
      shareViaLine(currentRecord);
    });

    main();
  </script>
</body>
</html>
